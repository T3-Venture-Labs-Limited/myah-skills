name: Rebuild Catalog
on:
  push:
    branches: [main]

concurrency:
  group: main-write-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Rebuild catalog and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main

            npm run build-catalog

            git add catalog.json
            if git diff --cached --quiet; then
              echo "Catalog already current on attempt $attempt; nothing to push"
              exit 0
            fi

            git commit -m "chore: rebuild catalog.json [skip ci]"
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi

            echo "Push rejected on attempt $attempt; refreshing and retrying"
            sleep 2
          done

          echo "Failed to push after 3 attempts"
          exit 1
      - name: Dispatch myah-landing bump-skills-pin workflow
        run: |
          SHA=$(git rev-parse HEAD)
          echo "Dispatching bump-skills-pin.yml with SHA: ${SHA}"
          curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.MYAH_SKILLS_WORKFLOW_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/T3-Venture-Labs-Limited/myah-landing/actions/workflows/bump-skills-pin.yml/dispatches \
            -d '{"ref":"main","inputs":{"sha":"'"${SHA}"'"}}'
