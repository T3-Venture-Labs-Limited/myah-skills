name: Rebuild Catalog
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build-catalog
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          git diff --cached --quiet || git commit -m "chore: rebuild catalog.json [skip ci]"
          git push
      - name: Dispatch myah-landing bump-skills-pin workflow
        run: |
          SHA=$(git rev-parse HEAD)
          echo "Dispatching bump-skills-pin.yml with SHA: ${SHA}"
          curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.MYAH_SKILLS_WORKFLOW_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/T3-Venture-Labs-Limited/myah-landing/actions/workflows/bump-skills-pin.yml/dispatches \
            -d '{"ref":"main","inputs":{"sha":"'"${SHA}"'"}}'
